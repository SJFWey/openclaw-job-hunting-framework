name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[yaml]"
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Tuning smoke test
        run: python scripts/job_scout_tuning.py --json
      - name: Scoring smoke test
        run: python scripts/score_lead.py --signals-file tests/fixtures/signals/python_cv_secondary_cpp.json --json
